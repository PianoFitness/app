name: piano_fitness
description: "Piano practice app with MIDI support for scales, chords, and arpeggios."
publish_to: "none"
version: 0.5.0

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.22.0 <4.0.0"

dependencies:
  audioplayers: ^6.0.0
  collection: ^1.19.1
  cupertino_icons: ^1.0.0
  device_info_plus: ^13.2.0
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  flutter_midi_command: ^1.0.6
  flutter_midi_command_ble: ^1.0.6
  intl: ^0.20.2
  logging: ^1.0.0
  meta: ^1.17.0
  mockito: ^5.7.0
  path_provider: ^2.1.5
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  timezone: ^0.11.1
  url_launcher: ^6.0.0
  uuid: ^4.5.3

dev_dependencies:
  build_runner: ^2.15.1
  drift_dev: ^2.34.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
